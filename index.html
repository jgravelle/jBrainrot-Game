<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jBrainRot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; }
  #game { position: fixed; inset: 0; display: block; }
  body { font-family: "Courier New", Courier, monospace; }

  /* ---------- HUD ---------- */
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    color: #fff; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
    -webkit-user-select: none; user-select: none;
  }
  .hud-block { position: absolute; font-weight: bold; }
  #score   { top: 16px; left: 18px;  font-size: 30px; }
  #score small { font-size: 15px; opacity: .8; display:block; }
  #score #wave { color: #ff5bd0; opacity: .95; }

  /* wave banner */
  #wavebanner {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%) scale(1);
    font-size: 54px; font-weight: bold; color: #ff5bd0;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000; text-align: center;
    pointer-events: none; opacity: 0; transition: opacity .25s, transform .25s;
    letter-spacing: 2px;
  }
  #wavebanner small { display:block; font-size: 22px; color:#fff; opacity:.85; margin-top:4px; }
  #wavebanner.show { opacity: 1; transform: translateX(-50%) scale(1.12); }
  #health  { top: 16px; right: 18px; font-size: 30px; text-align: right; }
  #combo {
    top: 14px; left: 50%; transform: translateX(-50%);
    font-size: 26px; text-align: center; transition: transform .08s ease-out;
    color: #ffe14d;
  }
  #combo .mult { font-size: 46px; display: block; line-height: .9; }
  #combo .bar {
    width: 160px; height: 9px; margin: 5px auto 0; background: rgba(0,0,0,.45);
    border: 2px solid #000; overflow: hidden;
  }
  #combo .bar > i { display:block; height: 100%; width: 0%; background: #ffe14d; }
  #combo.hidden { opacity: 0; }

  /* health bar */
  #hpbar { position: fixed; top: 54px; right: 18px; width: 180px; height: 14px;
           background: rgba(0,0,0,.45); border: 2px solid #000; pointer-events:none; }
  #hpbar > i { display:block; height:100%; width:100%; background:#46d35a; transition: width .12s; }

  /* crosshair */
  #cross {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 26px; height: 26px; pointer-events: none;
  }
  #cross::before, #cross::after {
    content:""; position:absolute; background:#fff; box-shadow:0 0 0 1px rgba(0,0,0,.6);
  }
  #cross::before { left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
  #cross::after  { top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }
  #cross.hit { transform: translate(-50%,-50%) scale(1.7) rotate(45deg); }
  #cross { transition: transform .07s ease-out; }

  /* hitmarker (the flick) */
  #hitmark { position: fixed; top:50%; left:50%; transform: translate(-50%,-50%);
             width:30px; height:30px; pointer-events:none; opacity:0; }
  #hitmark span { position:absolute; width:11px; height:3px; background:#ff3b3b; box-shadow:0 0 3px #000; }
  #hitmark .a{ top:6px;  left:2px;  transform: rotate(45deg); }
  #hitmark .b{ top:6px;  right:2px; transform: rotate(-45deg); }
  #hitmark .c{ bottom:6px;left:2px;  transform: rotate(-45deg); }
  #hitmark .d{ bottom:6px;right:2px; transform: rotate(45deg); }

  /* damage flash */
  #dmg { position: fixed; inset:0; pointer-events:none; opacity:0;
         box-shadow: inset 0 0 220px 80px rgba(220,0,0,.9); transition: opacity .12s; }

  /* floating score numbers layer */
  #floaters { position: fixed; inset:0; pointer-events:none; overflow:hidden; }
  .floater { position:absolute; font-weight:bold; color:#ffe14d; font-size:24px;
             text-shadow:2px 2px 0 #000; animation: floatUp .9s ease-out forwards; }
  .floater.head { color:#5fd0ff; }
  @keyframes floatUp { from{ transform:translate(-50%,0) scale(.7); opacity:0; }
    20%{ opacity:1; } to{ transform:translate(-50%,-70px) scale(1.2); opacity:0; } }

  /* radar */
  #radar { position: fixed; bottom: 16px; left: 16px; width: 156px; height: 156px;
           border-radius: 50%; pointer-events: none;
           box-shadow: 0 0 0 3px rgba(0,0,0,.55), 0 4px 14px rgba(0,0,0,.4); }

  /* ammo readout */
  #ammo { bottom: 16px; left: 50%; transform: translateX(-50%); top: auto;
          font-size: 36px; color:#ffe14d; text-align:center; line-height:1;
          text-shadow: 3px 3px 0 #000, -1px -1px 0 #000; }
  #ammo small { display:block; font-size:13px; color:#fff; opacity:.8; letter-spacing:3px; }
  #ammo.reload { color:#ff6b3d; }

  /* overlays */
  .overlay {
    position: fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background: rgba(10,16,30,.72); color:#fff; -webkit-user-select:none; user-select:none;
    cursor: pointer; z-index: 5;
  }
  .overlay.hidden { display:none; }
  .title { font-size: 64px; font-weight:bold; letter-spacing:3px;
           color:#ffd23f; text-shadow: 5px 5px 0 #d23f3f, 9px 9px 0 #000; margin-bottom:6px; }
  .title.small { font-size:46px; }
  .title .jb { color:#46e06a; }
  .tag { font-size: 24px; font-weight:bold; letter-spacing:12px; color:#fff;
         text-shadow:3px 3px 0 #000; margin: 2px 0 4px; padding-left:12px; }
  .sub { font-size: 20px; margin: 6px 0; opacity:.95; }
  .blink { animation: blink 1s steps(2,start) infinite; font-size:26px; margin-top:22px; color:#7CFC00; }
  @keyframes blink { 50% { opacity: 0.25; } }
  .stat { font-size: 28px; margin:4px 0; }
  .stat b { color:#ffe14d; }
  .keys { font-size:15px; opacity:.7; margin-top:18px; line-height:1.6; }
  .keys b { color:#ffd23f; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="score" class="hud-block">0<small>BEST 0</small><small id="wave">WAVE 1</small></div>
  <div id="combo" class="hud-block hidden">
    <span class="mult">x1</span>
    <div class="bar"><i></i></div>
  </div>
  <div id="health" class="hud-block">100</div>
</div>
<div id="hpbar"><i></i></div>

<div id="wavebanner"></div>

<div id="cross"></div>
<div id="hitmark"><span class="a"></span><span class="b"></span><span class="c"></span><span class="d"></span></div>
<div id="dmg"></div>
<div id="floaters"></div>

<canvas id="radar" width="156" height="156"></canvas>
<div id="ammo" class="hud-block"><span id="ammo-n">24</span><small>AMMO</small></div>

<div id="start" class="overlay">
  <div class="title"><span class="jb">j</span>BrainRot</div>
  <div class="tag">SHOOTER</div>
  <div class="sub">Shoot the brainrot before it gets you.</div>
  <div class="blink">CLICK TO PLAY</div>
  <div class="keys">
    <b>WASD</b> move &nbsp; <b>MOUSE</b> look &nbsp; <b>LEFT-CLICK</b> shoot &nbsp; <b>SHIFT</b> sprint &nbsp; <b>ESC</b> pause
  </div>
</div>

<div id="over" class="overlay hidden">
  <div class="title small">GAME OVER</div>
  <div class="stat">SCORE <b id="o-score">0</b></div>
  <div class="stat">BEST COMBO <b id="o-combo">x1</b></div>
  <div class="stat">HIGH SCORE <b id="o-best">0</b></div>
  <div class="blink">CLICK TO RESTART</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function () {

// =====================================================================
//  jBrainRot  —  single-file voxel meme FPS
// =====================================================================

// ---------- Three.js core ----------
const canvas   = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 55, 120);

const camera = new THREE.PerspectiveCamera(78, window.innerWidth/window.innerHeight, 0.05, 400);

// A yaw object holds the camera so we separate yaw (body) from pitch (head).
const yawObj   = new THREE.Object3D();
const pitchObj = new THREE.Object3D();
yawObj.add(pitchObj);
pitchObj.add(camera);
scene.add(yawObj);

const EYE = 1.7;
yawObj.position.set(0, EYE, 0);

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0xffffff, 0.78));
const sun = new THREE.DirectionalLight(0xffffff, 0.7);
sun.position.set(30, 60, 20);
scene.add(sun);
const sun2 = new THREE.DirectionalLight(0xfff0c0, 0.25);
sun2.position.set(-30, 40, -25);
scene.add(sun2);

// ---------- Shared geometry / material helpers ----------
const BOX = new THREE.BoxGeometry(1,1,1);
const matCache = {};
function mat(hex){
  if(!matCache[hex]) matCache[hex] = new THREE.MeshLambertMaterial({ color: hex, flatShading:true });
  return matCache[hex];
}
function cube(hex, sx, sy, sz, x, y, z){
  const m = new THREE.Mesh(BOX, mat(hex));
  m.scale.set(sx, sy, sz);
  m.position.set(x, y, z);
  return m;
}

// ---------- World / arena ----------
const ARENA = 38;            // half-extent-ish; ground is GRID x GRID cubes
const GRID  = 42;
const HALF  = GRID/2;

const groundGroup = new THREE.Group();
scene.add(groundGroup);

// Build ground from grass cubes using a single InstancedMesh for performance.
(function buildGround(){
  const count = GRID*GRID;
  const grass = [0x5fa83c, 0x6cb83f, 0x569a36, 0x65b23d];
  const inst = new THREE.InstancedMesh(BOX, new THREE.MeshLambertMaterial({vertexColors:true, flatShading:true}), count);
  const m4 = new THREE.Matrix4();
  const col = new THREE.Color();
  let i=0;
  for(let gx=0; gx<GRID; gx++){
    for(let gz=0; gz<GRID; gz++){
      const x = (gx-HALF)+0.5, z=(gz-HALF)+0.5;
      const h = 1 + (((gx*7+gz*13)%5===0)?0.0:0.0);
      m4.makeScale(1.0, 1, 1.0);
      m4.setPosition(x, -0.5, z);
      inst.setMatrixAt(i, m4);
      col.setHex(grass[(gx+gz)%grass.length]);
      inst.setColorAt(i, col);
      i++;
    }
  }
  inst.instanceMatrix.needsUpdate = true;
  if(inst.instanceColor) inst.instanceColor.needsUpdate = true;
  groundGroup.add(inst);
})();

// Scattered cover clusters (dirt/stone) — also collidable obstacles.
const obstacles = []; // {x,z,r}
(function buildCover(){
  const dirt=[0x8a5a2b,0x7a4d22], stone=[0x9a9a9a,0x808080,0xb0b0b0];
  // deterministic-ish scattering
  const spots = [
    [-12,-8],[10,-14],[-16,12],[14,10],[0,-18],[18,-2],[-18,-2],[6,16],[-6,6],[-9,-15],[15,-16],[-14,16]
  ];
  for(const [cx,cz] of spots){
    const w = 2+((Math.abs(cx)+Math.abs(cz))%3);
    const tall = 1+((cx+cz+100)%3);
    const pal = ((cx+cz)%2===0)?dirt:stone;
    for(let bx=0; bx<w; bx++){
      for(let bz=0; bz<w; bz++){
        const stackH = tall - ((bx+bz)%2);
        for(let by=0; by<stackH; by++){
          const x=cx+bx-(w/2|0), z=cz+bz-(w/2|0);
          const c = pal[(bx+bz+by)%pal.length];
          groundGroup.add(cube(c, 1, 1, 1, x, by+0.5, z));
        }
      }
    }
    obstacles.push({ x:cx, z:cz, r:Math.max(1.4, w*0.65) });
  }
})();

// boundary marker blocks (visual fence)
(function fence(){
  const c=0x3a3a3a;
  for(let i=-HALF; i<HALF; i+=2){
    groundGroup.add(cube(0x555a66,1,2,1, i, 1, -HALF));
    groundGroup.add(cube(0x555a66,1,2,1, i, 1,  HALF-1));
    groundGroup.add(cube(0x555a66,1,2,1, -HALF, 1, i));
    groundGroup.add(cube(0x555a66,1,2,1,  HALF-1, 1, i));
  }
})();

// =====================================================================
//  AUDIO  (WebAudio, all wrapped in try/catch)
// =====================================================================
let AC = null;
function audioInit(){ try{ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){} }
function tone(freq, dur, type, vol, slideTo){
  try{
    if(!AC) return;
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||'square';
    o.frequency.setValueAtTime(freq, t);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), t+dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol||0.18, t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function noiseBurst(dur, vol){
  try{
    if(!AC) return;
    const n = Math.floor(AC.sampleRate*dur);
    const buf = AC.createBuffer(1, n, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/n, 2);
    const src = AC.createBufferSource(); src.buffer = buf;
    const g = AC.createGain(); g.gain.value = vol||0.2;
    src.connect(g); g.connect(AC.destination); src.start();
  }catch(e){}
}
const SFX = {
  shoot(){ tone(720, 0.07, 'square', 0.12, 180); noiseBurst(0.04, 0.06); },
  hit(){ tone(420, 0.05, 'square', 0.10, 260); },
  kill(){ tone(180, 0.16, 'sawtooth', 0.20, 70); noiseBurst(0.1,0.12); tone(330,0.12,'square',0.10,120); },
  head(){ tone(1320, 0.10, 'square', 0.16, 760); tone(1760,0.08,'sine',0.10,1200); },
  hurt(){ tone(150, 0.18, 'sawtooth', 0.22, 60); noiseBurst(0.12,0.15); },
  over(){ tone(300,0.5,'sawtooth',0.22,60); tone(150,0.7,'square',0.16,40); },
  combo(n){ tone(500+n*60, 0.07, 'square', 0.12, 700+n*60); }
};

// =====================================================================
//  PLAYER STATE
// =====================================================================
const player = {
  vel: new THREE.Vector3(),
  speed: 6.4,
  sprintMul: 1.8,
  sprintTime: 0,      // remaining sprint window
  sprintCool: 0,      // cooldown
  hp: 100,
  ammo: 24,
  maxAmmo: 24,
  reloading: 0,       // remaining reload time
  alive: true,
};
const RELOAD_TIME = 1.05;
const keys = {};
let yaw = 0, pitch = 0;
const PITCH_CLAMP = Math.PI/2 - 0.08;

// =====================================================================
//  WEAPON VIEWMODEL
// =====================================================================
const gun = new THREE.Group();
(function buildGun(){
  gun.add(cube(0x222226, 0.16, 0.16, 0.55, 0, 0, -0.28));   // body
  gun.add(cube(0x111114, 0.10, 0.10, 0.42, 0, 0.02, -0.55)); // barrel
  gun.add(cube(0x333339, 0.14, 0.22, 0.14, 0, -0.13, -0.05)); // grip
  gun.add(cube(0xff5533, 0.06, 0.06, 0.06, 0, 0.05, -0.78));  // muzzle tip
  gun.position.set(0.32, -0.30, -0.6);
  camera.add(gun);
})();
// (camera is already in the scene graph via pitchObj; do NOT re-parent it)

// muzzle flash sprite
const flashMat = new THREE.SpriteMaterial({ color:0xffee66, transparent:true, opacity:0, depthTest:false });
const muzzle = new THREE.Sprite(flashMat);
muzzle.scale.set(0.5,0.5,0.5);
muzzle.position.set(0, 0.05, -0.85);
gun.add(muzzle);

// =====================================================================
//  ENEMIES
// =====================================================================
// Parody-of-the-parody: recognizably similar to the brainrot originals, but our own.
const NAMES = ["Skibbidy Potty","Tongue Tongue Surfer","Tralaloo Lalalero",
  "Bombardino Crocodingo","Ballerino Cappuccino","Chimpanzoodle Bananano","Lurilly Lorilla"];
const BODY_COLORS = [0xff5e5e,0x5ec8ff,0xffd24d,0x9b5eff,0x5eff8a,0xff8a3d,0xff5ed1,0x3dffd2];

const enemies = [];
let nameIdx = 0;

// label sprite cache by name
const labelCache = {};
function makeLabel(text){
  if(labelCache[text]) return labelCache[text].clone();
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 30px "Courier New", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // shrink font to fit
  let fs=30;
  while(ctx.measureText(text).width > 244 && fs>12){ fs-=2; ctx.font='bold '+fs+'px "Courier New", monospace'; }
  ctx.lineWidth = 6; ctx.strokeStyle='#000';
  ctx.strokeText(text, 128, 34);
  ctx.fillStyle = '#fff';
  ctx.fillText(text, 128, 34);
  const tex = new THREE.CanvasTexture(cv);
  tex.minFilter = THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  spr.scale.set(3.2, 0.8, 1);
  labelCache[text] = spr;
  return spr.clone();
}

function makeEnemy(){
  const g = new THREE.Group();
  const col = BODY_COLORS[(Math.random()*BODY_COLORS.length)|0];
  const col2 = BODY_COLORS[(Math.random()*BODY_COLORS.length)|0];

  // body parts (slightly asymmetric on purpose)
  const torso = cube(col, 0.9, 1.1, 0.6, 0, 1.15, 0);
  const head  = cube(col2, 0.7, 0.7, 0.7, (Math.random()-0.5)*0.12, 2.05, 0);
  const legL  = cube(0x333344, 0.32, 0.9, 0.32, -0.26, 0.45, 0);
  const legR  = cube(0x333344, 0.30, 0.9, 0.30,  0.27, 0.45, 0);
  const armL  = cube(col, 0.26, 0.85, 0.26, -0.62, 1.2, 0.02);
  const armR  = cube(col, 0.24, 0.85, 0.24,  0.62, 1.15, -0.02);
  // goofy eyes
  const eyeL = cube(0x000000, 0.12,0.12,0.06, -0.16, 2.12, 0.36);
  const eyeR = cube(0x000000, 0.14,0.14,0.06,  0.18, 2.10, 0.36);

  g.add(torso, head, legL, legR, armL, armR, eyeL, eyeR);

  const name = NAMES[nameIdx % NAMES.length]; nameIdx++;
  const label = makeLabel(name);
  label.position.set(0, 2.9, 0);
  g.add(label);

  // spawn at random edge
  const edge = Math.random()*Math.PI*2;
  const rad = HALF-3;
  g.position.set(Math.cos(edge)*rad, 0, Math.sin(edge)*rad);

  scene.add(g);

  const e = {
    group: g,
    head, torso, legL, legR, armL, armR, eyeL, eyeR,
    headParts:[head,eyeL,eyeR],
    parts:[torso,head,legL,legR,armL,armR,eyeL,eyeR],
    hp: 2 + (Math.random()<0.3?1:0),
    speed: 0,
    bob: Math.random()*Math.PI*2,
    lunge: 0,
    stagger: 0,
    color: col,
    color2: col2,
    name,
    label,
    alive:true,
    hitFlash:0,
    radius:0.6,
    attackCd:0,
  };
  enemies.push(e);
  return e;
}

// =====================================================================
//  PARTICLES  (pooled small cubes)
// =====================================================================
const particles = [];
const PART_GEO = BOX;
function spawnParticle(x,y,z,color,scale,vx,vy,vz,life){
  const m = new THREE.Mesh(PART_GEO, mat(color));
  const s = scale||0.18;
  m.scale.set(s,s,s);
  m.position.set(x,y,z);
  scene.add(m);
  particles.push({ mesh:m, vx,vy,vz, life, max:life, rot:(Math.random()-0.5)*0.4 });
}
function burst(x,y,z,color,n,power){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, up=Math.random()*0.8+0.2;
    const sp = (power||3)*(0.4+Math.random());
    spawnParticle(x,y,z,color, 0.12+Math.random()*0.14,
      Math.cos(a)*sp, up*sp, Math.sin(a)*sp, 0.4+Math.random()*0.3);
  }
}

// =====================================================================
//  HUD refs + helpers
// =====================================================================
const elScore = document.getElementById('score');
const elBestSmall = elScore.querySelector('small');
const elHealth = document.getElementById('health');
const elHpBar = document.querySelector('#hpbar > i');
const elCombo = document.getElementById('combo');
const elMult = elCombo.querySelector('.mult');
const elComboBar = elCombo.querySelector('.bar > i');
const elCross = document.getElementById('cross');
const elHit = document.getElementById('hitmark');
const elDmg = document.getElementById('dmg');
const elFloat = document.getElementById('floaters');
const startOv = document.getElementById('start');
const overOv = document.getElementById('over');
const elRadar = document.getElementById('radar');
const rctx = elRadar.getContext('2d');
const RAD_SIZE = elRadar.width;      // canvas px
const RAD_R = RAD_SIZE/2 - 5;        // usable radius
const RAD_RANGE = 46;                // world units mapped to radar edge (covers whole arena)
const elAmmo = document.getElementById('ammo');
const elAmmoN = document.getElementById('ammo-n');
const elWave = document.getElementById('wave');
const elWaveBanner = document.getElementById('wavebanner');

// =====================================================================
//  GAME STATE / SCORING / COMBO
// =====================================================================
const G = {
  running:false,
  score:0,
  best: Number(sessionStorage.getItem('brainrot_best')||0),
  combo:1,
  comboTimer:0,
  comboWindow:2.6,    // seconds before decay
  bestCombo:1,
  shake:0,
  hitstop:0,
  spawnTimer:0,
  fireCd:0,
  difficulty:0,
  // wave system
  wave:0,            // current wave number (0 = not started)
  waveActive:false,  // true while a wave's enemies are spawning / alive
  pendingSpawn:0,    // enemies still to spawn this wave
  waveBreak:0,       // countdown between waves
};
elBestSmall.textContent = 'BEST '+G.best;

function addScore(base, head, x,y,z){
  const gained = Math.round(base * G.combo);
  G.score += gained;
  elScore.firstChild.textContent = G.score;
  // floating number at projected position
  floatNumber('+'+gained, x,y,z, head);
}

function bumpCombo(){
  G.combo++;
  G.comboTimer = G.comboWindow;
  if(G.combo>G.bestCombo) G.bestCombo=G.combo;
  elCombo.classList.remove('hidden');
  elMult.textContent = 'x'+G.combo;
  // pop animation
  elCombo.style.transform = 'translateX(-50%) scale(1.35)';
  setTimeout(()=>{ elCombo.style.transform='translateX(-50%) scale(1)'; }, 90);
  // greedier color as it climbs
  const hot = Math.min(G.combo,12);
  const c = hot<4? '#ffe14d' : hot<7? '#ff9e2c' : hot<10? '#ff5b2c':'#ff2c6d';
  elMult.style.color = c; elComboBar.style.background=c;
  SFX.combo(Math.min(G.combo,10));
}
function breakCombo(){
  if(G.combo>1){ G.combo=1; elMult.textContent='x1'; }
  G.comboTimer=0;
  elCombo.classList.add('hidden');
}

function floatNumber(txt, x,y,z, head){
  const v = new THREE.Vector3(x,y,z).project(camera);
  if(v.z>1) return;
  const sx = (v.x*0.5+0.5)*window.innerWidth;
  const sy = (-v.y*0.5+0.5)*window.innerHeight;
  const d = document.createElement('div');
  d.className='floater'+(head?' head':'');
  d.textContent=txt;
  d.style.left=sx+'px'; d.style.top=sy+'px';
  elFloat.appendChild(d);
  setTimeout(()=>d.remove(), 950);
}

function flashHit(){
  elCross.classList.add('hit');
  setTimeout(()=>elCross.classList.remove('hit'), 70);
  elHit.style.transition='none'; elHit.style.opacity='1';
  setTimeout(()=>{ elHit.style.transition='opacity .18s'; elHit.style.opacity='0'; }, 20);
}

function damageFlash(){
  elDmg.style.opacity='0.9';
  setTimeout(()=>elDmg.style.opacity='0', 110);
}

function setHealth(h){
  player.hp = Math.max(0, Math.min(100, h));
  elHealth.textContent = Math.ceil(player.hp);
  elHpBar.style.width = player.hp+'%';
  elHpBar.style.background = player.hp>50? '#46d35a' : player.hp>25? '#ffc63a':'#e23b3b';
}

// =====================================================================
//  POINTER LOCK / INPUT
// =====================================================================
function lockPointer(){ canvas.requestPointerLock(); }

startOv.addEventListener('click', ()=>{ audioInit(); lockPointer(); });
overOv.addEventListener('click', ()=>{ audioInit(); resetGame(); lockPointer(); });

document.addEventListener('pointerlockchange', ()=>{
  const locked = document.pointerLockElement === canvas;
  if(locked){
    startOv.classList.add('hidden');
    if(!G.running && player.alive){ startGame(); }
    G.running = player.alive;
  } else {
    // paused (Esc) — only show start overlay if game still alive
    if(player.alive){
      G.running=false;
      startOv.classList.remove('hidden');
    }
  }
});

document.addEventListener('mousemove', (e)=>{
  if(document.pointerLockElement!==canvas) return;
  const s = 0.0022;
  yaw   -= e.movementX*s;
  pitch -= e.movementY*s;
  pitch = Math.max(-PITCH_CLAMP, Math.min(PITCH_CLAMP, pitch));
});

document.addEventListener('keydown', (e)=>{
  keys[e.code]=true;
  if(e.code==='ShiftLeft' || e.code==='ShiftRight') trySprint();
  if(e.code==='KeyR') startReload();
});
document.addEventListener('keyup', (e)=>{ keys[e.code]=false; });

document.addEventListener('mousedown', (e)=>{
  if(e.button===0 && document.pointerLockElement===canvas && G.running) shoot();
});

function trySprint(){
  if(player.sprintCool<=0 && player.sprintTime<=0){
    player.sprintTime = 0.45;
    player.sprintCool = 1.1;
  }
}

// =====================================================================
//  SHOOTING
// =====================================================================
const raycaster = new THREE.Raycaster();
const screenCenter = new THREE.Vector2(0,0);
let gunRecoil = 0;

function shoot(){
  if(G.fireCd>0 || player.reloading>0) return;
  if(player.ammo<=0){ startReload(); return; }
  G.fireCd = 0.12;          // tight cooldown
  player.ammo--;
  updateAmmoHUD();
  gunRecoil = 1;
  SFX.shoot();
  // muzzle flash
  flashMat.opacity = 1;
  G.shake = Math.max(G.shake, 0.12);

  raycaster.setFromCamera(screenCenter, camera);

  // gather candidate meshes (enemy parts) — raycast against them
  const hitList = [];
  for(const e of enemies){ if(e.alive) for(const p of e.parts) hitList.push(p); }
  const hits = raycaster.intersectObjects(hitList, false);

  if(hits.length){
    const h = hits[0];
    const mesh = h.object;
    const e = enemies.find(en=> en.alive && en.parts.indexOf(mesh)>=0 );
    if(e){
      const headShot = (e.headParts.indexOf(mesh) >= 0);
      hitEnemy(e, headShot, h.point);
      return;
    }
  }
  // missed: small combo decay pressure handled by timer; tiny puff is skipped
}

function hitEnemy(e, head, point){
  flashHit();
  e.hitFlash = 0.12;
  e.stagger = 0.18;
  const dmg = head?2:1;
  e.hp -= dmg;
  burst(point.x, point.y, point.z, head? 0x5fd0ff : e.color, head?9:6, head?4:3);

  if(e.hp<=0){
    killEnemy(e, head, point);
  } else {
    SFX.hit();
    // knock the enemy slightly
    const dir = new THREE.Vector3().subVectors(e.group.position, yawObj.position).setY(0).normalize();
    e.group.position.addScaledVector(dir, 0.25);
  }
}

function killEnemy(e, head, point){
  e.alive=false;
  G.hitstop = 0.042;                 // tiny hitstop
  G.shake = Math.max(G.shake, head?0.35:0.25);
  bumpCombo();
  const base = head?150:100;
  addScore(base, head, e.group.position.x, e.group.position.y+2.2, e.group.position.z);

  if(head){ SFX.head(); SFX.kill(); }
  else SFX.kill();

  // explode into component cubes that scatter + fade
  for(const p of e.parts){
    const wp = new THREE.Vector3();
    p.getWorldPosition(wp);
    const sx = p.scale.x, sy=p.scale.y, sz=p.scale.z;
    const m = new THREE.Mesh(BOX, p.material);
    m.scale.set(sx,sy,sz);
    m.position.copy(wp);
    scene.add(m);
    const a = Math.random()*Math.PI*2;
    particles.push({
      mesh:m,
      vx:Math.cos(a)*(2+Math.random()*3),
      vy:3+Math.random()*4,
      vz:Math.sin(a)*(2+Math.random()*3),
      life:0.8+Math.random()*0.4, max:1.2,
      rot:(Math.random()-0.5)*0.6, big:true
    });
  }
  // remove the enemy group
  scene.remove(e.group);
  // free
  const i = enemies.indexOf(e);
  if(i>=0) enemies.splice(i,1);
}

// =====================================================================
//  ENEMY DAMAGE TO PLAYER
// =====================================================================
function playerHit(amount){
  if(!player.alive) return;
  setHealth(player.hp - amount);
  damageFlash();
  G.shake = Math.max(G.shake, 0.4);
  SFX.hurt();
  breakCombo();
  if(player.hp<=0) gameOver();
}

// =====================================================================
//  SPAWN / DIFFICULTY
// =====================================================================
function enemiesForWave(n){
  // wave 1 = 3, then +2 each wave, soft-capped for a thick late crowd
  return Math.min(24, 3 + (n-1)*2);
}
function enemyBaseSpeed(){
  return 1.3 + Math.min(2.6, G.score/1650 + G.wave*0.08);
}

function updateWaveHUD(){
  elWave.textContent = 'WAVE '+G.wave;
}
function showWaveBanner(n){
  elWaveBanner.innerHTML = 'WAVE '+n+'<small>'+enemiesForWave(n)+' INCOMING</small>';
  elWaveBanner.classList.add('show');
  clearTimeout(showWaveBanner._t);
  showWaveBanner._t = setTimeout(()=>elWaveBanner.classList.remove('show'), 1500);
}

function startWave(n){
  G.wave = n;
  G.waveActive = true;
  G.pendingSpawn = enemiesForWave(n);
  G.spawnTimer = 0;          // start spawning right away
  updateWaveHUD();
  showWaveBanner(n);
}

function updateSpawns(dt){
  // between waves: brief breather, then launch the next one
  if(!G.waveActive){
    G.waveBreak -= dt;
    if(G.waveBreak <= 0) startWave(G.wave + 1);
    return;
  }
  // trickle this wave's enemies onto the field (pairs once it heats up)
  G.spawnTimer -= dt;
  if(G.pendingSpawn > 0 && G.spawnTimer <= 0){
    const batch = Math.min(G.pendingSpawn, G.wave >= 4 ? 2 : 1);
    for(let i=0;i<batch;i++){
      const e = makeEnemy();
      e.speed = enemyBaseSpeed() * (0.85+Math.random()*0.4);
      G.pendingSpawn--;
    }
    G.spawnTimer = Math.max(0.28, 0.9 - G.wave*0.04);
  }
  // wave cleared once every enemy is spawned AND dead
  if(G.pendingSpawn === 0 && enemies.length === 0){
    G.waveActive = false;
    G.waveBreak = 2.4;       // seconds of calm before the next wave
  }
}

// =====================================================================
//  PICKUPS  (health = green, ammo = yellow) — also shown on radar
// =====================================================================
const pickups = []; // {mesh, type:'health'|'ammo', x, z, bob}
let pickupTimer = 0;

function overlapsObstacle(x,z){
  for(const o of obstacles){ if(Math.hypot(x-o.x, z-o.z) < o.r+1.2) return true; }
  return Math.hypot(x,z) < 5; // keep clear of the spawn point too
}
function makePickup(type, x, z){
  const g = new THREE.Group();
  const color = type==='health' ? 0x46e06a : 0xffe14d;
  g.add(cube(color, 0.5,0.5,0.5, 0,0,0));
  // little contrasting detail so they read at a glance
  if(type==='health'){
    g.add(cube(0xffffff, 0.55,0.16,0.16, 0,0,0));
    g.add(cube(0xffffff, 0.16,0.55,0.16, 0,0,0));
  } else {
    g.add(cube(0x333322, 0.5,0.16,0.5, 0,0.08,0));
  }
  g.position.set(x, 0.8, z);
  scene.add(g);
  pickups.push({ mesh:g, type, x, z, bob:Math.random()*6.28 });
}
function spawnPickupAt(type){
  let x=0, z=0, tries=0;
  do {
    const a=Math.random()*6.2832, r=7+Math.random()*(HALF-10);
    x=Math.cos(a)*r; z=Math.sin(a)*r; tries++;
  } while(tries<12 && overlapsObstacle(x,z));
  makePickup(type, x, z);
}
function collectPickup(p){
  if(p.type==='health'){
    setHealth(player.hp + 25);
    floatNumber('+25 HP', p.x, 1.4, p.z, true);
    tone(680,0.10,'square',0.14,1040); tone(900,0.08,'sine',0.10,1300);
  } else {
    player.ammo = player.maxAmmo; player.reloading = 0;
    elAmmo.classList.remove('reload'); updateAmmoHUD();
    floatNumber('+AMMO', p.x, 1.4, p.z, false);
    tone(820,0.09,'square',0.13,1200);
  }
}
function updatePickups(dt){
  const pp = yawObj.position;
  for(let i=pickups.length-1;i>=0;i--){
    const p = pickups[i];
    p.bob += dt*3;
    p.mesh.position.y = 0.75 + Math.sin(p.bob)*0.18;
    p.mesh.rotation.y += dt*1.7;
    if(Math.hypot(pp.x-p.x, pp.z-p.z) < 1.4){
      collectPickup(p);
      scene.remove(p.mesh);
      pickups.splice(i,1);
    }
  }
  // keep a light scatter of pickups on the field
  pickupTimer -= dt;
  if(pickupTimer<=0){
    const nAmmo   = pickups.filter(p=>p.type==='ammo').length;
    const nHealth = pickups.filter(p=>p.type==='health').length;
    if(nAmmo < 3)       spawnPickupAt('ammo');
    else if(nHealth < 2) spawnPickupAt('health');
    pickupTimer = 2.8;
  }
}

function startReload(){
  if(player.reloading>0 || player.ammo===player.maxAmmo || !player.alive) return;
  player.reloading = RELOAD_TIME;
  elAmmo.classList.add('reload');
  updateAmmoHUD();
  tone(230,0.10,'square',0.10,150);
}
function updateAmmoHUD(){
  elAmmoN.textContent = player.reloading>0 ? '— —' : player.ammo;
}

// =====================================================================
//  RADAR  (player-relative, forward = up)
// =====================================================================
function drawRadar(){
  const ctx=rctx, S=RAD_SIZE, c=S/2;
  ctx.clearRect(0,0,S,S);
  ctx.save();
  ctx.beginPath(); ctx.arc(c,c,RAD_R+3,0,6.2832); ctx.clip();
  // backdrop
  ctx.fillStyle='rgba(8,22,14,0.6)'; ctx.fillRect(0,0,S,S);
  // rings + sweep lines
  ctx.strokeStyle='rgba(120,210,150,0.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(c,c,RAD_R*0.5,0,6.2832); ctx.stroke();
  ctx.beginPath(); ctx.arc(c,c,RAD_R,0,6.2832); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c,2); ctx.lineTo(c,S-2); ctx.moveTo(2,c); ctx.lineTo(S-2,c); ctx.stroke();

  const px=yawObj.position.x, pz=yawObj.position.z;
  const sinY=Math.sin(yaw), cosY=Math.cos(yaw), scale=RAD_R/RAD_RANGE;
  function plot(ex,ez,color,size){
    const rx=ex-px, rz=ez-pz;
    const fwd = -(rx*sinY + rz*cosY);   // toward look dir => up
    const rgt =  (rx*cosY - rz*sinY);   // player's right => +x
    let sx=c+rgt*scale, sy=c-fwd*scale;
    const d=Math.hypot(rgt,fwd)*scale;
    if(d>RAD_R){ const k=RAD_R/d; sx=c+rgt*scale*k; sy=c-fwd*scale*k; ctx.globalAlpha=0.55; }
    else ctx.globalAlpha=1;
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.arc(sx,sy,size,0,6.2832); ctx.fill();
    ctx.globalAlpha=1;
  }
  for(const p of pickups) plot(p.x, p.z, p.type==='health'?'#46e06a':'#ffe14d', 2.6);
  for(const e of enemies){ if(e.alive) plot(e.group.position.x, e.group.position.z, '#ff3b3b', 3); }
  ctx.restore();

  // player (white) at center + facing wedge pointing up
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.moveTo(c,c-9); ctx.lineTo(c-5,c+4); ctx.lineTo(c+5,c+4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(c,c,3.4,0,6.2832); ctx.fill();
  // rim
  ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(c,c,RAD_R+3,0,6.2832); ctx.stroke();
}

// =====================================================================
//  GAME LIFECYCLE
// =====================================================================
function startGame(){
  G.running = true;
  // first-ever run: kick off wave 1
  if(G.wave===0 && enemies.length===0){
    spawnPickupAt('ammo'); spawnPickupAt('health');
    startWave(1);
  }
}

function resetGame(){
  // clear enemies + particles + pickups
  for(const e of enemies) scene.remove(e.group);
  enemies.length=0;
  for(const p of particles) scene.remove(p.mesh);
  particles.length=0;
  for(const p of pickups) scene.remove(p.mesh);
  pickups.length=0;
  // reset state
  G.score=0; G.combo=1; G.comboTimer=0; G.bestCombo=1; G.shake=0; G.hitstop=0;
  G.spawnTimer=0; G.fireCd=0; G.running=true;
  G.wave=0; G.waveActive=false; G.pendingSpawn=0; G.waveBreak=0;
  elWaveBanner.classList.remove('show');
  player.hp=100; player.alive=true; player.vel.set(0,0,0);
  player.sprintTime=0; player.sprintCool=0;
  player.ammo=player.maxAmmo; player.reloading=0; pickupTimer=0;
  elAmmo.classList.remove('reload'); updateAmmoHUD();
  yawObj.position.set(0,EYE,0); yaw=0; pitch=0;
  elScore.firstChild.textContent='0';
  setHealth(100);
  breakCombo();
  overOv.classList.add('hidden');
  startOv.classList.add('hidden');
  // seed a couple of pickups + launch wave 1
  spawnPickupAt('ammo'); spawnPickupAt('health');
  startWave(1);
}

function gameOver(){
  player.alive=false;
  G.running=false;
  SFX.over();
  if(G.score>G.best){ G.best=G.score; sessionStorage.setItem('brainrot_best', G.best); }
  elBestSmall.textContent='BEST '+G.best;
  document.getElementById('o-score').textContent=G.score;
  document.getElementById('o-combo').textContent='x'+G.bestCombo;
  document.getElementById('o-best').textContent=G.best;
  overOv.classList.remove('hidden');
  if(document.pointerLockElement) document.exitPointerLock();
}

// =====================================================================
//  COLLISION (player vs obstacles + arena bounds)
// =====================================================================
function collide(pos){
  // arena bounds
  const lim = HALF-1.5;
  pos.x = Math.max(-lim, Math.min(lim, pos.x));
  pos.z = Math.max(-lim, Math.min(lim, pos.z));
  // obstacles (circle push-out)
  for(const o of obstacles){
    const dx=pos.x-o.x, dz=pos.z-o.z;
    const d=Math.hypot(dx,dz), min=o.r+0.5;
    if(d<min && d>0.0001){
      pos.x = o.x + dx/d*min;
      pos.z = o.z + dz/d*min;
    }
  }
}

// =====================================================================
//  UPDATE LOOP
// =====================================================================
let last = performance.now();
let bobPhase=0;

function update(dt){
  // ----- hitstop freezes world sim (but not rendering) -----
  if(G.hitstop>0){ G.hitstop-=dt; if(G.hitstop<0) G.hitstop=0; dt = 0; }

  // ----- player movement -----
  if(G.running){
    let mx=0, mz=0;
    if(keys['KeyW']) mz-=1;
    if(keys['KeyS']) mz+=1;
    if(keys['KeyA']) mx-=1;
    if(keys['KeyD']) mx+=1;
    const len=Math.hypot(mx,mz);
    if(len>0){ mx/=len; mz/=len; }

    // sprint timers
    if(player.sprintTime>0) player.sprintTime-=dt;
    if(player.sprintCool>0) player.sprintCool-=dt;
    const sprinting = player.sprintTime>0;
    const spd = player.speed * (sprinting?player.sprintMul:1);

    // desired velocity in world space (relative to yaw)
    const sinY=Math.sin(yaw), cosY=Math.cos(yaw);
    const wantX = (mx*cosY + mz*sinY) * spd;
    const wantZ = (mz*cosY - mx*sinY) * spd;

    // snappy accel + slight momentum
    const accel = (len>0?22:16);
    player.vel.x += (wantX-player.vel.x)*Math.min(1, accel*dt);
    player.vel.z += (wantZ-player.vel.z)*Math.min(1, accel*dt);

    const np = yawObj.position.clone();
    np.x += player.vel.x*dt;
    np.z += player.vel.z*dt;
    collide(np);
    yawObj.position.copy(np);
    yawObj.position.y = EYE;

    // viewmodel bob
    const moving = Math.hypot(player.vel.x,player.vel.z);
    bobPhase += dt*(moving*1.6+2);
  }

  // ----- apply look -----
  yawObj.rotation.y = yaw;
  pitchObj.rotation.x = pitch;

  // ----- gun recoil + sway + bob -----
  gunRecoil += (0-gunRecoil)*Math.min(1, 12*dt);
  const moveAmt = Math.hypot(player.vel.x, player.vel.z)*0.01;
  const bobX = Math.cos(bobPhase)*0.012*(1+moveAmt*40);
  const bobY = Math.abs(Math.sin(bobPhase))*0.016*(1+moveAmt*40);
  gun.position.x = 0.32 + Math.sin(bobPhase*0.5)*0.006 + bobX;
  gun.position.y = -0.30 + bobY - gunRecoil*0.04;
  gun.position.z = -0.6 + gunRecoil*0.12;
  gun.rotation.x = gunRecoil*0.5 + Math.sin(bobPhase*0.5)*0.01;
  flashMat.opacity *= 0.78;
  if(flashMat.opacity<0.02) flashMat.opacity=0;
  muzzle.scale.setScalar(0.3 + flashMat.opacity*0.5);

  // ----- fire cooldown / reload / combo decay -----
  if(G.fireCd>0) G.fireCd-=dt;
  if(player.reloading>0){
    player.reloading-=dt;
    if(player.reloading<=0){
      player.reloading=0; player.ammo=player.maxAmmo;
      elAmmo.classList.remove('reload'); updateAmmoHUD();
      tone(640,0.08,'square',0.12,900);
    }
  }
  if(G.running && G.combo>1){
    G.comboTimer -= dt;
    elComboBar.style.width = Math.max(0,(G.comboTimer/G.comboWindow))*100+'%';
    if(G.comboTimer<=0) breakCombo();
  }

  // ----- enemies -----
  if(G.running){
    updateSpawns(dt);
    updatePickups(dt);
    const pp = yawObj.position;
    for(const e of enemies){
      if(!e.alive) continue;
      const g=e.group;
      const dx=pp.x-g.position.x, dz=pp.z-g.position.z;
      const dist=Math.hypot(dx,dz);
      const dirX=dx/(dist||1), dirZ=dz/(dist||1);

      // face the player
      const targetYaw = Math.atan2(dirX, dirZ);
      g.rotation.y = targetYaw;

      // waddle bob + lunge when close
      e.bob += dt*(6 + e.speed);
      let sp = e.speed;
      if(dist<6){ e.lunge = Math.min(1, e.lunge+dt*2); sp *= 1+e.lunge*0.6; }
      else { e.lunge = Math.max(0, e.lunge-dt); }

      if(e.stagger>0){ e.stagger-=dt; sp*=0.25; }

      // move toward player (avoid stacking too tightly is fine for chaos)
      g.position.x += dirX*sp*dt;
      g.position.z += dirZ*sp*dt;

      // waddle: rock side to side + bob up
      g.rotation.z = Math.sin(e.bob)*0.12;
      g.position.y = Math.abs(Math.sin(e.bob*1.0))*0.12;

      // animate legs
      const swing=Math.sin(e.bob)*0.5;
      e.legL.rotation.x = swing; e.legR.rotation.x = -swing;
      e.armL.rotation.x = -swing*0.6; e.armR.rotation.x = swing*0.6;

      // hit flash (whiten)
      if(e.hitFlash>0){
        e.hitFlash-=dt;
        e.torso.material = mat(0xffffff);
        e.head.material = mat(0xffffff);
        if(e.hitFlash<=0){ e.torso.material=mat(e.color); e.head.material=mat(e.color2); }
      }

      // attack
      if(dist < 1.5){
        playerHit(16);
        // pop the enemy on contact
        burst(g.position.x,1.2,g.position.z,e.color,8,3);
        e.alive=false;
        scene.remove(g);
        const idx=enemies.indexOf(e); if(idx>=0) enemies.splice(idx,1);
      }
    }
  }

  // ----- particles -----
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); continue; }
    p.vy -= 9.8*dt*(p.big?1:1.4);
    p.mesh.position.x += p.vx*dt;
    p.mesh.position.y += p.vy*dt;
    p.mesh.position.z += p.vz*dt;
    if(p.mesh.position.y<0.08){ p.mesh.position.y=0.08; p.vy*=-0.4; p.vx*=0.6; p.vz*=0.6; }
    p.mesh.rotation.x += p.rot; p.mesh.rotation.y += p.rot*0.7;
    // fade by shrinking near end
    const t=p.life/p.max;
    if(t<0.4){ const s=Math.max(0.01,t/0.4); p.mesh.scale.multiplyScalar(0.92); }
  }

  // ----- camera shake -----
  if(G.shake>0){
    G.shake = Math.max(0, G.shake-dt*2.2);
    const s=G.shake;
    camera.position.x = (Math.random()-0.5)*s*0.5;
    camera.position.y = (Math.random()-0.5)*s*0.5;
    camera.position.z = (Math.random()-0.5)*s*0.3;
  } else {
    camera.position.set(0,0,0);
  }
}

function loop(now){
  let dt = (now-last)/1000;
  last = now;
  if(dt>0.05) dt=0.05;   // clamp big frame gaps
  update(dt);
  renderer.render(scene, camera);
  drawRadar();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------- resize ----------
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// init HUD
setHealth(100);
updateAmmoHUD();

})();
</script>
</body>
</html>
